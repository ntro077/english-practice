<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 to 3000 – Master 3000 English Words</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e14;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a38;
    --accent: #f5c842;
    --accent2: #e87c3e;
    --green: #4ade80;
    --red: #f87171;
    --text: #f0f0f5;
    --muted: #888899;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(245,200,66,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,124,62,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* SCREENS */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* ===== HOME SCREEN ===== */
  #home {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }
  #home .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 10vw, 96px);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    animation: fadeUp 0.8s ease both;
  }
  #home .tagline {
    font-size: 18px;
    color: var(--muted);
    margin-bottom: 48px;
    animation: fadeUp 0.8s 0.15s ease both;
  }
  .stats-row {
    display: flex;
    gap: 24px;
    margin-bottom: 48px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.8s 0.25s ease both;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 32px;
    text-align: center;
  }
  .stat-card .num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-card .label { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .progress-section {
    width: 100%;
    max-width: 480px;
    margin-bottom: 40px;
    animation: fadeUp 0.8s 0.35s ease both;
  }
  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 100px;
    height: 10px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 1s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 36px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0e0e14;
    animation: fadeUp 0.8s 0.45s ease both;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(245,200,66,0.3); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    padding: 10px 20px;
  }
  .btn-ghost:hover { color: var(--text); }

  /* ===== PRACTICE SCREEN ===== */
  #practice { min-height: 100vh; padding: 24px 20px 60px; max-width: 700px; margin: 0 auto; }
  .practice-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .day-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }
  .word-progress { font-size: 14px; color: var(--muted); }

  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px;
    margin-bottom: 20px;
    animation: slideIn 0.4s ease;
  }
  .word-number { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .word-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 8vw, 64px);
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 8px;
    line-height: 1;
  }
  .word-pos {
    display: inline-block;
    background: var(--surface2);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 20px;
  }
  .synonyms-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .synonym-tag {
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.2);
    color: var(--accent);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 14px;
  }

  .example-sentence {
    background: var(--surface2);
    border-left: 3px solid var(--accent2);
    border-radius: 0 12px 12px 0;
    padding: 14px 18px;
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 10px;
    color: var(--text);
  }
  .example-sentence strong { color: var(--accent); font-style: normal; }

  /* Pronunciation */
  .pronunciation-section {
    background: var(--surface2);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .pronunciation-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mic-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .mic-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  .mic-btn:hover { transform: scale(1.08); }
  .mic-btn.listening {
    animation: pulse 1.5s infinite;
    background: var(--red);
  }
  .mic-btn.listening::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--red);
    opacity: 0.4;
    animation: ripple 1.5s infinite;
  }
  .listen-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .listen-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pronunciation-feedback {
    text-align: center;
    font-size: 14px;
    min-height: 24px;
    color: var(--muted);
    transition: color 0.3s;
  }
  .pronunciation-feedback.good { color: var(--green); }
  .pronunciation-feedback.try-again { color: var(--accent2); }

  /* Phrase practice */
  .phrase-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .phrase-text { flex: 1; font-size: 14px; line-height: 1.5; }
  .phrase-play {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .phrase-play:hover { border-color: var(--accent); color: var(--accent); }

  .words-nav {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .word-nav-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }
  .word-nav-dot.active { border-color: var(--accent); color: var(--accent); background: rgba(245,200,66,0.1); }
  .word-nav-dot.done { border-color: var(--green); background: rgba(74,222,128,0.1); color: var(--green); }

  .loading-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 60px 36px;
    text-align: center;
    margin-bottom: 20px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  /* ===== TEST SCREEN ===== */
  #test { min-height: 100vh; padding: 24px 20px 60px; max-width: 600px; margin: 0 auto; }
  .test-header { margin-bottom: 32px; text-align: center; }
  .test-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .test-subtitle { color: var(--muted); font-size: 15px; }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    animation: slideIn 0.3s ease;
  }
  .question-num { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .question-text { font-size: 18px; font-weight: 500; margin-bottom: 20px; line-height: 1.5; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(245,200,66,0.05); }
  .option-btn.correct { border-color: var(--green); background: rgba(74,222,128,0.1); color: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: rgba(248,113,113,0.1); color: var(--red); }

  .test-progress-bar {
    background: var(--surface2);
    border-radius: 100px;
    height: 6px;
    margin-bottom: 24px;
  }
  .test-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.3s;
  }

  /* ===== RESULT SCREEN ===== */
  #result { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
  .result-emoji { font-size: 80px; margin-bottom: 16px; animation: bounce 0.6s ease; }
  .result-title { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 900; margin-bottom: 8px; }
  .result-score { font-size: 20px; color: var(--muted); margin-bottom: 40px; }
  .result-score span { color: var(--accent); font-weight: 700; font-size: 28px; }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes ripple { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.8); opacity: 0; } }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 70% { transform: translateY(-10px); } }

  /* Footer */
  .footer {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
    position: relative;
    z-index: 1;
  }
  .footer span {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .word-card, .pronunciation-section { padding: 20px; }
    .practice-header { flex-direction: column; gap: 12px; align-items: flex-start; }
  }

  .complete-day-btn { margin-top: 16px; width: 100%; justify-content: center; }
  .alert-banner {
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.3);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 20px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="logo">3 to 3000</div>
  <div class="tagline">Master 3000 essential English words and kickstart your English language journey — 3 words a day.</div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num">3,000</div>
      <div class="label">Total Words</div>
    </div>
    <div class="stat-card">
      <div class="num" id="home-day-num">1</div>
      <div class="label">Current Day</div>
    </div>
    <div class="stat-card">
      <div class="num" id="home-words-learned">0</div>
      <div class="label">Words Learned</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span>Overall Progress</span>
      <span id="home-pct">0%</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="home-progress-bar" style="width:0%"></div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="startPractice()">▶ Start Today's Practice</button>
</div>

<!-- PRACTICE SCREEN -->
<div id="practice" class="screen">
  <div class="practice-header">
    <button class="btn btn-ghost" onclick="goHome()">← Back</button>
    <div class="day-badge" id="practice-day-badge">Day 1</div>
    <div class="word-progress" id="word-progress-label">Word 1 of 3</div>
  </div>

  <div class="words-nav" id="words-nav"></div>

  <div id="word-content"></div>

  <div style="display:flex;gap:12px;justify-content:center;margin-top:8px;">
    <button class="btn btn-secondary" id="prev-btn" onclick="prevWord()" style="display:none">← Prev</button>
    <button class="btn btn-primary" id="next-btn" onclick="nextWord()">Next Word →</button>
    <button class="btn btn-primary complete-day-btn" id="complete-day-btn" onclick="completeDay()" style="display:none">✓ Complete Day</button>
  </div>
</div>

<!-- TEST SCREEN -->
<div id="test" class="screen">
  <div class="test-header">
    <div class="test-title">📝 Review Test</div>
    <div class="test-subtitle" id="test-subtitle">Days 1–10 · 10 Questions</div>
  </div>

  <div class="test-progress-bar">
    <div class="test-progress-fill" id="test-progress-fill" style="width:0%"></div>
  </div>

  <div id="test-content"></div>
</div>

<!-- RESULT SCREEN -->
<div id="result" class="screen">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">Great Job!</div>
  <div class="result-score">You scored <span id="result-score-num">8/10</span></div>
  <div id="result-message" style="color:var(--muted);max-width:400px;margin-bottom:40px;line-height:1.6"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-secondary" id="retry-btn" onclick="retryTest()" style="display:none">🔁 Retry Test</button>
    <button class="btn btn-primary" id="continue-btn" onclick="goHome()">Continue Learning →</button>
  </div>
</div>

<footer class="footer">
  Made with ❤️ by <span>EnglishTeacherRush</span>
</footer>

// ===================== STATE =====================
const STATE_KEY = 'wordwise_state';
function loadState() {
  try {
    const s = localStorage.getItem(STATE_KEY);
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}
function saveState(s) {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(s)); } catch {}
}
function getInitialState() {
  return { currentDay: 1, wordsCompleted: 0, testsPassed: [], needsTest: false, testDay: null };
}

let state = loadState() || getInitialState();
let currentWordIndex = 0;
let wordData = []; // AI-generated data for today's words
let testQuestions = [];
let testAnswers = [];
let testCurrentQ = 0;

// ===================== HOME =====================
function updateHome() {
  const wordsLearned = (state.currentDay - 1) * 3;
  document.getElementById('home-day-num').textContent = state.currentDay;
  document.getElementById('home-words-learned').textContent = wordsLearned;
  const pct = Math.round((wordsLearned / ALL_WORDS.length) * 100);
  document.getElementById('home-pct').textContent = pct + '%';
  document.getElementById('home-progress-bar').style.width = pct + '%';
}

function goHome() {
  showScreen('home');
  updateHome();
}

// ===================== PRACTICE =====================
async function startPractice() {
  // Check if test is needed
  if (state.needsTest) {
    startTest();
    return;
  }
  currentWordIndex = 0;
  wordData = [];
  showScreen('practice');
  const dayIdx = state.currentDay - 1;
  const startWord = dayIdx * 3;
  const todaysWords = ALL_WORDS.slice(startWord, startWord + 3);

  document.getElementById('practice-day-badge').textContent = 'Day ' + state.currentDay;
  buildWordNav(todaysWords.length);
  await loadWordData(todaysWords, 0);
}

function buildWordNav(count) {
  const nav = document.getElementById('words-nav');
  nav.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const btn = document.createElement('button');
    btn.className = 'word-nav-dot' + (i === 0 ? ' active' : '');
    btn.textContent = i + 1;
    btn.onclick = () => jumpToWord(i);
    btn.id = 'nav-dot-' + i;
    nav.appendChild(btn);
  }
}

function updateWordNav(active) {
  for (let i = 0; i < 3; i++) {
    const dot = document.getElementById('nav-dot-' + i);
    if (!dot) continue;
    dot.className = 'word-nav-dot' + (i < active ? ' done' : i === active ? ' active' : '');
  }
  document.getElementById('word-progress-label').textContent = `Word ${active + 1} of 3`;
}

async function jumpToWord(i) {
  currentWordIndex = i;
  const dayIdx = state.currentDay - 1;
  const startWord = dayIdx * 3;
  const todaysWords = ALL_WORDS.slice(startWord, startWord + 3);
  updateWordNav(i);
  updateNavButtons(i, todaysWords.length);
  if (wordData[i]) {
    renderWord(wordData[i], todaysWords[i], i);
  } else {
    await loadWordData(todaysWords, i);
  }
}

function updateNavButtons(idx, total) {
  document.getElementById('prev-btn').style.display = idx > 0 ? 'inline-flex' : 'none';
  document.getElementById('next-btn').style.display = idx < total - 1 ? 'inline-flex' : 'none';
  document.getElementById('complete-day-btn').style.display = idx === total - 1 && wordData[idx] ? 'inline-flex' : 'none';
}

async function loadWordData(wordsArr, idx) {
  document.getElementById('word-content').innerHTML = `
    <div class="loading-card">
      <div class="spinner"></div>
      <div style="color:var(--muted)">Generating content for "<strong style="color:var(--text)">${wordsArr[idx]}</strong>"...</div>
    </div>`;
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('prev-btn').style.display = idx > 0 ? 'inline-flex' : 'none';
  document.getElementById('complete-day-btn').style.display = 'none';

  try {
    const data = await fetchWordData(wordsArr[idx]);
    wordData[idx] = data;
    renderWord(data, wordsArr[idx], idx);
    updateWordNav(idx);
    updateNavButtons(idx, wordsArr.length);
  } catch (e) {
    document.getElementById('word-content').innerHTML = `
      <div class="loading-card">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div style="color:var(--muted)">Failed to load content. Please check your connection.</div>
        <button class="btn btn-secondary" style="margin-top:16px" onclick="loadWordData(['${wordsArr[idx]}'],0)">Try Again</button>
      </div>`;
  }
}

async function fetchWordData(word) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: `For the English word "${word}", provide a JSON object with these exact keys:
- "word": the word
- "pos": part of speech (noun/verb/adjective/adverb/etc)
- "synonyms": array of 4 synonyms
- "sentences": array of 3 example sentences using the word naturally (make the word bold using <strong> tags)
- "phrases": array of 2 common phrases or idioms containing or related to this word, each as a plain string
Respond ONLY with the JSON object, no markdown, no preamble.`
      }]
    })
  });
  const json = await resp.json();
  const text = json.content[0].text.replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

function renderWord(data, word, idx) {
  const html = `
    <div class="word-card">
      <div class="word-number">Word ${idx + 1}</div>
      <div class="word-title">${data.word || word}</div>
      <span class="word-pos">${data.pos || 'word'}</span>

      <div class="section-label">Synonyms</div>
      <div class="synonyms-list">
        ${(data.synonyms || []).map(s => `<span class="synonym-tag">${s}</span>`).join('')}
      </div>

      <div class="section-label">Example Sentences</div>
      ${(data.sentences || []).map(s => `<div class="example-sentence">${s}</div>`).join('')}

      <div class="section-label">Common Phrases</div>
      ${(data.phrases || []).map(p => `
        <div class="phrase-row">
          <div class="phrase-text">${p}</div>
          <button class="phrase-play" onclick="speakText('${p.replace(/'/g,"\\'")}')">🔊 Listen</button>
        </div>`).join('')}
    </div>

    <div class="pronunciation-section">
      <div class="pronunciation-title">🎤 Pronunciation Practice</div>
      <div style="margin-bottom:16px">
        <button class="listen-btn" onclick="speakText('${word}', 0.7)">🔊 Hear the word</button>
      </div>
      <div class="mic-container">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic('${word}')">🎙</button>
        <div style="font-size:13px;color:var(--muted)">Tap to practice your pronunciation</div>
        <div class="pronunciation-feedback" id="pron-feedback">Press the mic and say the word aloud</div>
      </div>
      <div style="margin-top:16px">
        <div class="section-label">Practice these sentences aloud</div>
        ${(data.sentences || []).slice(0,2).map((s,i) => `
          <div class="phrase-row">
            <div class="phrase-text" style="font-size:13px">${s.replace(/<\/?strong>/g,'')}</div>
            <button class="phrase-play" onclick="speakText(\`${s.replace(/<\/?strong>/g,'').replace(/`/g,"'")}\`)">🔊</button>
          </div>`).join('')}
      </div>
    </div>`;

  document.getElementById('word-content').innerHTML = html;
}

// ===================== NAVIGATION =====================
async function nextWord() {
  const dayIdx = state.currentDay - 1;
  const startWord = dayIdx * 3;
  const todaysWords = ALL_WORDS.slice(startWord, startWord + 3);
  currentWordIndex++;
  updateWordNav(currentWordIndex);
  updateNavButtons(currentWordIndex, todaysWords.length);
  if (wordData[currentWordIndex]) {
    renderWord(wordData[currentWordIndex], todaysWords[currentWordIndex], currentWordIndex);
  } else {
    await loadWordData(todaysWords, currentWordIndex);
  }
}

async function prevWord() {
  const dayIdx = state.currentDay - 1;
  const startWord = dayIdx * 3;
  const todaysWords = ALL_WORDS.slice(startWord, startWord + 3);
  currentWordIndex--;
  updateWordNav(currentWordIndex);
  updateNavButtons(currentWordIndex, todaysWords.length);
  if (wordData[currentWordIndex]) {
    renderWord(wordData[currentWordIndex], todaysWords[currentWordIndex], currentWordIndex);
  } else {
    await loadWordData(todaysWords, currentWordIndex);
  }
}

function completeDay() {
  state.wordsCompleted = state.currentDay * 3;
  // Every 10 days, require a test
  if (state.currentDay % 10 === 0) {
    state.needsTest = true;
    state.testDay = state.currentDay;
  } else {
    state.currentDay++;
  }
  saveState(state);
  if (state.needsTest) {
    startTest();
  } else {
    goHome();
  }
}

// ===================== SPEECH =====================
function speakText(text, rate = 1) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = rate;
  window.speechSynthesis.speak(utt);
}

let recognition = null;
let isListening = false;

function toggleMic(targetWord) {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    document.getElementById('pron-feedback').textContent = 'Speech recognition not supported in this browser. Try Chrome!';
    return;
  }
  if (isListening) {
    recognition && recognition.stop();
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;

  const btn = document.getElementById('mic-btn');
  const fb = document.getElementById('pron-feedback');

  recognition.onstart = () => {
    isListening = true;
    btn.classList.add('listening');
    fb.textContent = 'Listening... say the word!';
    fb.className = 'pronunciation-feedback';
  };

  recognition.onresult = (e) => {
    const said = e.results[0][0].transcript.trim().toLowerCase();
    const target = targetWord.toLowerCase();
    isListening = false;
    btn.classList.remove('listening');

    if (said === target || said.includes(target) || target.includes(said)) {
      fb.textContent = '✅ Great pronunciation! "' + said + '"';
      fb.className = 'pronunciation-feedback good';
    } else {
      fb.textContent = '🔄 You said "' + said + '" — try again! Listen first, then repeat.';
      fb.className = 'pronunciation-feedback try-again';
    }
  };

  recognition.onerror = () => {
    isListening = false;
    btn.classList.remove('listening');
    fb.textContent = 'Could not hear you. Try again!';
    fb.className = 'pronunciation-feedback';
  };

  recognition.onend = () => {
    isListening = false;
    btn && btn.classList.remove('listening');
  };

  recognition.start();
}

// ===================== TEST =====================
async function startTest() {
  showScreen('test');
  const testDay = state.testDay || state.currentDay;
  const startBlock = (testDay - 10) * 3;
  const endBlock = testDay * 3;
  const reviewWords = ALL_WORDS.slice(Math.max(0, startBlock), endBlock);
  document.getElementById('test-subtitle').textContent = `Days ${testDay - 9}–${testDay} · 10 Questions`;

  document.getElementById('test-content').innerHTML = `
    <div class="loading-card">
      <div class="spinner"></div>
      <div style="color:var(--muted)">Generating your test questions...</div>
    </div>`;

  try {
    testQuestions = await fetchTestQuestions(reviewWords);
    testAnswers = [];
    testCurrentQ = 0;
    renderQuestion();
  } catch {
    document.getElementById('test-content').innerHTML = `
      <div class="loading-card">
        <div style="color:var(--muted)">Failed to load test. Please try again.</div>
        <button class="btn btn-secondary" style="margin-top:16px" onclick="startTest()">Retry</button>
      </div>`;
  }
}

async function fetchTestQuestions(words) {
  const sample = words.sort(() => Math.random() - 0.5).slice(0, 15).join(', ');
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: `Create 10 multiple-choice English vocabulary questions using some of these words: ${sample}. 
Mix question types: fill in the blank, synonym matching, and meaning questions.
Respond ONLY with a JSON array of 10 objects, each with:
- "question": the question text
- "options": array of 4 answer strings
- "answer": the correct answer string (must match one of the options exactly)
No markdown, no extra text.`
      }]
    })
  });
  const json = await resp.json();
  const text = json.content[0].text.replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

function renderQuestion() {
  if (testCurrentQ >= testQuestions.length) {
    finishTest();
    return;
  }
  const q = testQuestions[testCurrentQ];
  const pct = (testCurrentQ / testQuestions.length) * 100;
  document.getElementById('test-progress-fill').style.width = pct + '%';

  document.getElementById('test-content').innerHTML = `
    <div class="question-card">
      <div class="question-num">Question ${testCurrentQ + 1} of ${testQuestions.length}</div>
      <div class="question-text">${q.question}</div>
      <div class="options">
        ${q.options.map(opt => `
          <button class="option-btn" onclick="selectAnswer(this, '${opt.replace(/'/g,"\\'")}', '${q.answer.replace(/'/g,"\\'")}')">
            ${opt}
          </button>`).join('')}
      </div>
    </div>`;
}

function selectAnswer(btn, selected, correct) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  if (selected === correct) {
    btn.classList.add('correct');
    testAnswers.push(true);
  } else {
    btn.classList.add('wrong');
    testAnswers.push(false);
    btns.forEach(b => { if (b.textContent.trim() === correct) b.classList.add('correct'); });
  }

  setTimeout(() => {
    testCurrentQ++;
    renderQuestion();
  }, 1200);
}

function finishTest() {
  const score = testAnswers.filter(Boolean).length;
  const total = testAnswers.length;
  const passed = score >= Math.ceil(total * 0.7); // 70% to pass

  document.getElementById('test-progress-fill').style.width = '100%';
  showScreen('result');

  document.getElementById('result-score-num').textContent = `${score}/${total}`;

  if (passed) {
    document.getElementById('result-emoji').textContent = score === total ? '🏆' : '🎉';
    document.getElementById('result-title').textContent = score === total ? 'Perfect Score!' : 'You Passed!';
    document.getElementById('result-message').textContent = `Excellent work! You've completed the review for days ${state.testDay - 9}–${state.testDay}. Keep up the great progress!`;
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('continue-btn').textContent = 'Continue to Day ' + (state.testDay + 1) + ' →';

    state.testsPassed.push(state.testDay);
    state.needsTest = false;
    state.currentDay = state.testDay + 1;
    saveState(state);
  } else {
    document.getElementById('result-emoji').textContent = '💪';
    document.getElementById('result-title').textContent = 'Almost There!';
    document.getElementById('result-message').textContent = `You need 70% to pass (${Math.ceil(total * 0.7)}/${total}). Review the words and try again — you've got this!`;
    document.getElementById('retry-btn').style.display = 'inline-flex';
    document.getElementById('continue-btn').style.display = 'none';
  }
}

function retryTest() {
  startTest();
}

// ===================== SCREEN HELPER =====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ===================== INIT =====================
updateHome();
</script>
